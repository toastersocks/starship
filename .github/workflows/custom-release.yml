name: Custom release build

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub prerelease with the built artifacts"
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: custom-release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short
  RUSTUP_MAX_RETRIES: 10
  MACOSX_DEPLOYMENT_TARGET: 10.7

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            name: starship-aarch64-apple-darwin.tar.gz
            build_tool: cargo

          - target: x86_64-apple-darwin
            os: macos-latest
            name: starship-x86_64-apple-darwin.tar.gz
            build_tool: cargo

          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: starship-x86_64-unknown-linux-gnu.tar.gz
            build_tool: cargo

          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: starship-aarch64-unknown-linux-musl.tar.gz
            build_tool: cross

    steps:
      - name: Setup | Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup | Rust
        run: rustup toolchain install stable --profile minimal --target ${{ matrix.target }} --no-self-update

      - name: Setup | Cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      - name: Setup | Install cross
        if: matrix.build_tool == 'cross'
        uses: taiki-e/install-action@7a79fe8c3a13344501c80d99cae481c1c9085912 # v2.81.10
        with:
          tool: cross@0.2.5

      - name: Build | Cargo
        if: matrix.build_tool == 'cargo'
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Build | Cross
        if: matrix.build_tool == 'cross'
        run: cross build --release --locked --target ${{ matrix.target }}

      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czvf ../../../${{ matrix.name }} starship

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  prerelease:
    name: Create prerelease
    runs-on: ubuntu-latest
    needs: build
    if: ${{ inputs.create_release }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          path: artifacts

      - name: Create prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: custom-${{ github.ref_name }}-${{ github.run_number }}
        run: |
          gh release create "$TAG_NAME" artifacts/*/* \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "Custom Starship build $TAG_NAME" \
            --notes "Custom Starship build from $GITHUB_SHA." \
            --prerelease
